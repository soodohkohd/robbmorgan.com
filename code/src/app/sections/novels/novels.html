<app-section-shell
  eyebrow="Free your imagination"
  title="Novels"
  lede="Stories of mine — available now on Amazon."
>
  <img
    slot="icon"
    class="portrait-icon"
    src="/robb-morgan.webp"
    alt="Robb Morgan - Novels"
    title="Robb Morgan - Novels"
  />

  <!-- Selector pills: published novels on the left, current projects
       on the right with a distinct dark fill. -->
  <div class="novel-index" role="tablist" aria-label="Novels">
    @for (novel of novels; track novel.slug) {
      <button
        type="button"
        class="novel-index-pill"
        role="tab"
        [class.is-active]="selectedSlug() === novel.slug"
        [attr.aria-selected]="selectedSlug() === novel.slug"
        (click)="select(novel.slug)"
      >{{ novel.label }}</button>
    }
    @for (project of currentProjects; track project.slug) {
      <button
        type="button"
        class="novel-index-pill is-wip"
        role="tab"
        [class.is-active]="selectedSlug() === project.slug"
        [attr.aria-selected]="selectedSlug() === project.slug"
        (click)="select(project.slug)"
      >Current Project: {{ project.label }}</button>
    }
  </div>

  <!-- Selected novel below -->
  <ul class="novels">
    <li class="novel">
      <img
        class="novel-cover"
        [src]="selectedNovel().cover"
        [alt]="selectedNovel().coverAlt"
        loading="lazy"
        decoding="async"
      />
      <div class="novel-body">
        <h2 class="novel-title">{{ selectedNovel().title }}</h2>
        <div class="novel-desc">
          @for (para of selectedNovel().description; track $index) {
            <p [innerHTML]="para"></p>
          }
        </div>
        @if (selectedNovel().buyUrl) {
          <a
            class="novel-buy"
            [href]="selectedNovel().buyUrl"
            target="_blank"
            rel="noopener noreferrer"
          >
            Find it on Amazon
            <span class="novel-buy-arrow" aria-hidden="true">↗</span>
          </a>
        }
      </div>
    </li>
  </ul>
</app-section-shell>
